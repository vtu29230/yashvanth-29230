<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Monitoring System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f4f4}
.dark{background:#121212;color:white}
.header{background:#007bff;color:white;padding:20px;text-align:center}
.container{width:90%;margin:auto;padding:20px}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.dark .card{background:#1f1f1f;color:white}
#loginPage{display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#007bff,#00c6ff)}
.login-box{background:white;padding:30px;border-radius:12px;width:350px;text-align:center}
.login-box input{width:90%;padding:10px;margin:8px 0}
button{padding:10px 15px;border:none;border-radius:5px;cursor:pointer;color:white;background:#28a745}
.logout-btn{background:red}
#dashboard{display:none}
.stats{display:flex;gap:10px;flex-wrap:wrap}
.stat{flex:1;min-width:180px;background:#007bff;color:white;padding:15px;border-radius:8px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:10px;text-align:center}
th{background:#007bff;color:white}
.up{color:green;font-weight:bold}
</style>
</head>
<body>

<div id="loginPage">
<div class="login-box">
<h2>Website Monitoring Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="dashboard">
<div class="header">
<button class="logout-btn" onclick="logout()">Logout</button>
<button onclick="toggleDarkMode()">Dark Mode</button>
<h1>Website Monitoring System</h1>
<p id="clock"></p>
</div>

<div class="container">

<div class="card">
<h3>User Profile</h3>
<p>Email: <span id="userEmail"></span></p>
<p>Last Login: <span id="loginTime"></span></p>
</div>

<div class="stats">
<div class="stat">Total Websites: 4</div>
<div class="stat">Active: 4</div>
<div class="stat">Down: 0</div>
<div class="stat">Avg Response: 152 ms</div>
</div>

<div class="card">
<input type="text" id="searchBox" placeholder="Search Website..." onkeyup="searchWebsite()" style="width:100%;padding:10px">
</div>

<div class="card">
<h2>Website Status</h2>
<table id="websiteTable">
<tr><th>Website</th><th>Status</th><th>Response Time</th></tr>
<tr><td>Google</td><td class="up">UP</td><td>120 ms</td></tr>
<tr><td>GitHub</td><td class="up">UP</td><td>180 ms</td></tr>
<tr><td>LinkedIn</td><td class="up">UP</td><td>150 ms</td></tr>
<tr><td>Vel Tech</td><td class="up">UP</td><td>160 ms</td></tr>
</table>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h2>AI Voice Alerts</h2>
<button onclick="speak('Google website is up')">Google</button>
<button onclick="speak('GitHub website is up')">GitHub</button>
<button onclick="speak('LinkedIn website is up')">LinkedIn</button>
<button onclick="speak('Vel Tech website is up')">Vel Tech</button>
</div>

</div>
</div>

<script>
function login(){
 let email=document.getElementById('email').value;
 let password=document.getElementById('password').value;
 if(email && password){
   document.getElementById('userEmail').innerText=email;
   document.getElementById('loginTime').innerText=new Date().toLocaleString();
   document.getElementById('loginPage').style.display='none';
   document.getElementById('dashboard').style.display='block';
   loadChart();
 }
 else alert('Enter email and password');
}
function logout(){
 document.getElementById('dashboard').style.display='none';
 document.getElementById('loginPage').style.display='flex';
}
function toggleDarkMode(){document.body.classList.toggle('dark');}
function speak(msg){speechSynthesis.speak(new SpeechSynthesisUtterance(msg));}
function searchWebsite(){
 let input=document.getElementById('searchBox').value.toUpperCase();
 let tr=document.querySelectorAll('#websiteTable tr');
 for(let i=1;i<tr.length;i++){
  let txt=tr[i].cells[0].innerText.toUpperCase();
  tr[i].style.display=txt.includes(input)?'':'none';
 }
}
setInterval(()=>{
 document.getElementById('clock').innerText=new Date().toLocaleString();
},1000);

let chartLoaded=false;
function loadChart(){
 if(chartLoaded) return;
 chartLoaded=true;
 new Chart(document.getElementById('chart'),{
  type:'bar',
  data:{labels:['Google','GitHub','LinkedIn','Vel Tech'],
  datasets:[{label:'Response Time (ms)',data:[120,180,150,160]}]}
 });
}
</script>
</body>
</html>
